name: Java CI/CD with Maven + Docker

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: employee-app
          path: target/*.jar

      - name: Run Application (CD Simulation)
        run: |
          echo "Starting application..."
          java -jar target/*.jar > app.log 2>&1 &
          sleep 15

          echo "Printing logs..."
          cat app.log || true

      - name: Upload Logs
        uses: actions/upload-artifact@v4
        with:
          name: application-logs
          path: app.log

      # -------------------------------
      # 🚀 DOCKER VERSIONING STARTS HERE
      # -------------------------------

      - name: Set Image Tag
        run: echo "TAG=${{ github.run_number }}" >> $GITHUB_ENV

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/employee-app:${{ env.TAG }} .
          docker build -t ${{ secrets.DOCKER_USERNAME }}/employee-app:latest .

      - name: Push Docker Images
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/employee-app:${{ env.TAG }}
          docker push ${{ secrets.DOCKER_USERNAME }}/employee-app:latest
